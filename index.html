<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study Binder - Photocards</title>
  <!-- Supabase JS Client v2 CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background-color: #f4f6f8;
      padding: 20px;
      margin: 0;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    /* Auth Card */
    .card {
      background: #ffffff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 12px;
    }

    input {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    button {
      background-color: #3b82f6;
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background-color: #2563eb;
    }

    /* Wide Photocard Styling */
    .photocard-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }

    .photocard {
      background: #fff;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
    }

    /* Displays full photocard in wide layout without cropping */
    .photocard img {
      width: 100%;
      height: 220px; /* Adjust height as needed */
      object-fit: contain; /* Shows full photo without cropping */
      background-color: #111;
    }

    .photocard-content {
      padding: 12px;
    }

    .error-msg {
      color: #dc2626;
      margin-top: 8px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>Study Binder Dashboard</h2>

    <!-- Login Section -->
    <div id="auth-section" class="card">
      <h3>Login</h3>
      <div class="form-group">
        <input type="email" id="email" placeholder="Email address" />
      </div>
      <div class="form-group">
        <input type="password" id="password" placeholder="Password" />
      </div>
      <button onclick="handleLogin()">Sign In</button>
      <div id="auth-error" class="error-msg"></div>
    </div>

    <!-- User Logged In Info -->
    <div id="user-section" class="card" style="display: none;">
      <p>Logged in as: <strong id="user-email"></strong></p>
      <button onclick="handleLogout()">Logout</button>
    </div>

    <!-- Photocards Gallery -->
    <h3>Photocards</h3>
    <div id="gallery" class="photocard-container">
      <!-- Dynamic photocards will load here -->
    </div>
  </div>

  <script>
    // ------------------------------------------------------------------
    // 1. SUPABASE CONFIGURATION
    // Replace YOUR_SUPABASE_ANON_KEY with your project's actual anon key.
    // ------------------------------------------------------------------
    const SUPABASE_URL = 'https://tssgtdlmnjmbqdljqvdq.supabase.co';
    const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY'; // MUST BE VALID

    const { createClient } = supabase;
    const client = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: {
        persistSession: true,
        autoRefreshToken: true,
        detectSessionInUrl: true
      }
    });

    // ------------------------------------------------------------------
    // 2. AUTHENTICATION LOGIC
    // ------------------------------------------------------------------
    async function handleLogin() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorDiv = document.getElementById('auth-error');
      errorDiv.innerText = '';

      const { data, error } = await client.auth.signInWithPassword({
        email: email,
        password: password
      });

      if (error) {
        errorDiv.innerText = "Login failure: " + error.message;
      } else {
        updateUI(data.session);
        fetchPhotocards();
      }
    }

    async function handleLogout() {
      await client.auth.signOut();
      localStorage.clear();
      updateUI(null);
    }

    function updateUI(session) {
      const authSection = document.getElementById('auth-section');
      const userSection = document.getElementById('user-section');
      const userEmail = document.getElementById('user-email');

      if (session) {
        authSection.style.display = 'none';
        userSection.style.display = 'block';
        userEmail.innerText = session.user.email;
      } else {
        authSection.style.display = 'block';
        userSection.style.display = 'none';
        document.getElementById('gallery').innerHTML = '';
      }
    }

    // ------------------------------------------------------------------
    // 3. FETCH DATA & AUTO-CLEAR BAD SESSIONS (FIX FOR 401 ERRORS)
    // ------------------------------------------------------------------
    async function fetchPhotocards() {
      const { data, error } = await client
        .from('master_drops_pool')
        .select('*');

      if (error) {
        console.error('Fetch error:', error);
        
        // Handle stale/expired 401 token errors automatically
        if (error.code === '401' || error.status === 401 || error.message.includes('JWT')) {
          alert('Session expired or key invalid. Resetting login session...');
          await handleLogout();
        }
        return;
      }

      renderPhotocards(data);
    }

    function renderPhotocards(cards) {
      const gallery = document.getElementById('gallery');
      gallery.innerHTML = '';

      if (!cards || cards.length === 0) {
        gallery.innerHTML = '<p>No photocards found.</p>';
        return;
      }

      cards.forEach(card => {
        const cardEl = document.createElement('div');
        cardEl.className = 'photocard';
        cardEl.innerHTML = `
          <img src="${card.image_url || 'https://via.placeholder.com/400x200'}" alt="${card.title || 'Photocard'}" />
          <div class="photocard-content">
            <h4>${card.title || 'Untitled Card'}</h4>
            <p>${card.description || ''}</p>
          </div>
        `;
        gallery.appendChild(cardEl);
      });
    }

    // ------------------------------------------------------------------
    // 4. INITIALIZE APP ON LOAD
    // ------------------------------------------------------------------
    async function init() {
      const { data: { session } } = await client.auth.getSession();
      updateUI(session);
      if (session) {
        fetchPhotocards();
      }
    }

    init();
  </script>
</body>
</html>
